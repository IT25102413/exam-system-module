<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>

    <title>Edit Question</title>

    <style>
        body{
            font-family: "Arial Black";
            background-color: aqua;
            padding: 30px;
        }
        .container{
            width: 500px;
            margin: auto;
            background-color: white;
            padding: 25px;
            border-radius: 10px;
        }
        input{
            width: 100%;
            padding: 10px;
            margin-top: 10px;
        }
        button{
            margin-top: 15px;
            padding: 10px;
            width: 100%;
            background-color: green;
            color: white;
            border: none;
        }
    </style>
</head>
<body>
<div class="container">
    <h2>Edit Question</h2>
    <form th:action="@{'/update-question/'+${question.id}}" method="post">
        <input type="text"
               name="questionText"
               th:value="${question.questionText}"
               placeholder="Enter Question">
        <input type="text" name="optionA"
               th:value="${question.optionA}"
               placeholder="Enter Option A">
        <input type="text" name="optionB"
               th:value="${question.optionB}"
               placeholder="Enter Option B">
        <input type="text" name="optionC"
               th:value="${question.optionC}"
               placeholder="Enter Option C">
        <input type="text" name="optionD"
               th:value="${question.optionD}"
               placeholder="Enter Option D">
        <input type="text" name="correctAnswer"
               th:value="${question.correctAnswer}"
               placeholder="Enter Correct Answer">

        <button type="submit">
            Update Question
        </button>
    </form>
</div>
</body>
</html>
